global:
  scrape_interval: 5s 

# 1. Tell Prometheus WHERE the alert rules are
rule_files:
  - "alert.rules"

# 2. Tell Prometheus WHERE to send the alerts (Alertmanager)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

scrape_configs:
  - job_name: 'python-app'
    static_configs:
      - targets: ['python-app:5000']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
