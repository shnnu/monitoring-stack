version: '3.8'

services:
  # 1. The Python Backend
  python-app:
    build: ./app
    container_name: python-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres-db
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - PYTHONUNBUFFERED=1
    volumes:
      - ./app:/app
    depends_on:
      - postgres-db
    networks:
      - monitoring-network

  # 2. Database
  postgres-db:
    image: postgres:13
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring-network

  # 3. Reverse Proxy (FIXED PATH)
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      # This points to your actual file in the nginx folder
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - python-app
    networks:
      - monitoring-network

  # 4. Metrics Collector
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      # Ensure prometheus.yml is actually in your main folder
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - monitoring-network

  # 5. Visualization
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring-network

  # 6. OS Metrics Exporter
  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - monitoring-network

volumes:
  postgres_data:
  grafana_data:

networks:
  monitoring-network:
    driver: bridge
